<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="facebook-domain-verification" content="enehkn7pnqisw3hu5oee9peazkult9" />
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sofia AI — Gavaldon Plumbing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    header { background: #1a1d27; border-bottom: 1px solid #2d3748; padding: 18px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    header span { font-size: 13px; color: #718096; margin-left: auto; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #48bb78; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
    .card .label { font-size: 12px; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-weight: 700; }
    .card.emergency .value { color: #fc8181; }
    .card.scheduled .value { color: #f6e05e; }
    .card.total .value { color: #63b3ed; }
    .card.new .value { color: #68d391; }

    h2 { font-size: 15px; font-weight: 600; color: #a0aec0; margin-bottom: 16px; text-transform: uppercase; letter-spacing: .05em; }

    table { width: 100%; border-collapse: collapse; background: #1a1d27; border: 1px solid #2d3748; border-radius: 12px; overflow: hidden; }
    th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #718096; border-bottom: 1px solid #2d3748; }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #1e2330; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2330; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.Emergency { background: #742a2a; color: #fc8181; }
    .badge.Scheduled { background: #744210; color: #f6e05e; }
    .badge.Not-a-lead { background: #2d3748; color: #718096; }
    .badge.New-Lead { background: #1c4532; color: #68d391; }
    .badge.Follow-Up { background: #2a4365; color: #63b3ed; }
    .badge.Not-Qualified { background: #2d3748; color: #718096; }

    .name { font-weight: 600; color: #e2e8f0; }
    .phone { font-size: 12px; color: #718096; margin-top: 2px; }
    .summary { font-size: 12px; color: #a0aec0; max-width: 280px; line-height: 1.5; }
    a.notion { font-size: 12px; color: #63b3ed; text-decoration: none; }
    a.notion:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 60px; color: #718096; }
    .error { text-align: center; padding: 40px; color: #fc8181; }
    .refresh { font-size: 12px; color: #4a5568; margin-top: 24px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>🔧 Gavaldon Plumbing — Sofia AI</h1>
    <span id="updated">Loading...</span>
  </header>
  <main>
    <div class="stats" id="stats">
      <div class="card total"><div class="label">Total Calls</div><div class="value" id="s-total">—</div></div>
      <div class="card emergency"><div class="label">Emergency</div><div class="value" id="s-emergency">—</div></div>
      <div class="card scheduled"><div class="label">Scheduled</div><div class="value" id="s-scheduled">—</div></div>
      <div class="card new"><div class="label">New Leads</div><div class="value" id="s-new">—</div></div>
    </div>
    <h2>Recent Calls</h2>
    <div id="table-wrap"><div class="loading">Loading calls...</div></div>
    <p class="refresh">Auto-refreshes every 60 seconds</p>
  </main>

  <script>
    const API = 'https://roberto-gavaldon3--sofia-ai-voice-serve.modal.run/api/dashboard';

    function badgeClass(val) { return val.replace(/\s+/g, '-'); }

    function render(data) {
      document.getElementById('s-total').textContent     = data.stats.total;
      document.getElementById('s-emergency').textContent = data.stats.emergency;
      document.getElementById('s-scheduled').textContent = data.stats.scheduled;
      document.getElementById('s-new').textContent       = data.stats.new_lead;
      document.getElementById('updated').textContent     = 'Updated ' + new Date().toLocaleTimeString();

      if (!data.calls.length) {
        document.getElementById('table-wrap').innerHTML = '<div class="loading">No calls yet.</div>';
        return;
      }

      const rows = data.calls.map(c => `
        <tr>
          <td><div class="name">${c.name}</div><div class="phone">${c.phone || '—'}</div></td>
          <td>${c.service}</td>
          <td><span class="badge ${badgeClass(c.urgency)}">${c.urgency}</span></td>
          <td><span class="badge ${badgeClass(c.status)}">${c.status}</span></td>
          <td class="summary">${c.summary}</td>
          <td>${c.date}</td>
          <td><a class="notion" href="${c.notion_url}" target="_blank">View →</a></td>
        </tr>`).join('');

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead><tr>
            <th>Caller</th><th>Service</th><th>Urgency</th><th>Status</th><th>Summary</th><th>Date</th><th>Transcript</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function load() {
      fetch(API)
        .then(r => r.json())
        .then(render)
        .catch(() => {
          document.getElementById('table-wrap').innerHTML = '<div class="error">Could not load data. Check Modal is running.</div>';
        });
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
